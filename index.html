<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>乔帮主 AI 工作台：教学驾驶舱</title>
  <style>
    :root {
      --board: #172417;
      --chalk: #f3ead6;
      --yellow: #ffd54f;
      --blue: #81d4fa;
      --wood: #7a5432;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f160f;
      color: var(--chalk);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 18px 28px;
      background: linear-gradient(180deg, #8d6e4a, var(--wood));
      border-bottom: 4px solid #4d321f;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 44px);
      letter-spacing: 0;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 24px auto 48px;
    }

    .panel {
      border: 3px solid rgba(243, 234, 214, 0.7);
      background: var(--board);
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.35);
      padding: 22px;
      margin-bottom: 22px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .chip {
      border: 1px solid rgba(255, 213, 79, 0.8);
      color: var(--yellow);
      padding: 8px 12px;
      border-radius: 4px;
      font-weight: 700;
    }

    .hero-image {
      width: 100%;
      display: block;
      border: 3px solid #0b0f0b;
      background: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .question {
      border-left: 5px solid var(--blue);
      padding-left: 14px;
      min-height: 120px;
    }

    button {
      appearance: none;
      border: 2px solid var(--yellow);
      background: transparent;
      color: var(--yellow);
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 4px;
      font-weight: 800;
      cursor: pointer;
    }

    .answer {
      margin-top: 12px;
      color: var(--yellow);
      font-weight: 800;
      display: none;
    }

    @media (max-width: 760px) {
      header {
        padding: 16px;
      }

      main {
        width: min(100% - 20px, 1180px);
      }

      .panel {
        padding: 16px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>三角形内角和教学驾驶舱</h1>
  </header>

  <main>
    <section class="panel">
      <h2>学习目标</h2>
      <div class="chips">
        <span class="chip">理解内角和 180°</span>
        <span class="chip">会用剪拼法解释</span>
        <span class="chip">会计算缺失角</span>
        <span class="chip">区分内角与外角</span>
      </div>
    </section>

    <section class="panel">
      <h2>NotebookLM 生成信息图</h2>
      <img class="hero-image" src="assets/triangle-angle-sum-infographic.jpg" alt="三角形内角和信息图" loading="lazy">
    </section>

    <section class="panel">
      <h2>形成性评量</h2>
      <div class="grid">
        <div class="question">
          <h3>题目 1</h3>
          <p>一个三角形的两个内角是 45° 和 65°，第三个角是多少？</p>
          <button onclick="document.getElementById('a1').style.display='block'">显示答案</button>
          <div id="a1" class="answer">70°</div>
        </div>
        <div class="question">
          <h3>题目 2</h3>
          <p>为什么不应该只死记硬背 180°？</p>
          <button onclick="document.getElementById('a2').style.display='block'">显示答案</button>
          <div id="a2" class="answer">因为要能解释来源，例如剪拼法或平行线辅助线。</div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
